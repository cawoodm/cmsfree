<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearth &amp; Wheat Bakery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
  </head>
  <body>
    <!--
  cmsfree layout template — the SINGLE source of page layout.
  Used both to generate every static page (Publish) and as the shell the CMS
  renders into (edit mode). The CMS fills the two placeholders:
    <nav x-cms-nav>       → the section nav (generated)
    <main x-cms-content>  → the page's rendered markdown
  Elements can be conditionally shown with data-cms-show="<expression>", a JS
  expression evaluated against the current page (e.g. `page.slug`).
  x-cms-block="_name.md" fills an element with a root-level Block's rendered
  content (e.g. the footer, from content/_footer.md) — for template-wide
  content that isn't scoped to any page or section.
  <title> is set per page at publish time.
-->

    <header class="site-header">
      <a href="#/"><img class="logo" src="/images/logo.svg" alt="Hearth & Wheat Bakery" /></a>
      <nav class="site-nav" x-cms-nav></nav>
    </header>

    <div class="hero" data-cms-show="page.slug === 'home'">
      <img src="/images/hero-bakery.svg" alt="Hearth & Wheat Bakery storefront" />
      <div class="hero-text" x-cms-block="_hero.md"></div>
    </div>

    <main x-cms-content></main>

    <footer class="site-footer" x-cms-block="_footer.md"></footer>

    <!-- cms:entry -->
  </body>
</html>
