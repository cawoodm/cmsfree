<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <rect width="700" height="420" fill="#EFE1C6"/>

  <!-- three figures -->
  <g transform="translate(160,150)">
    <circle cx="0" cy="0" r="38" fill="#E0B679"/>
    <rect x="-46" y="34" width="92" height="140" rx="30" fill="#8A5A2B"/>
  </g>
  <g transform="translate(350,120)">
    <circle cx="0" cy="0" r="44" fill="#D9A653"/>
    <rect x="-54" y="40" width="108" height="160" rx="34" fill="#C1663B"/>
  </g>
  <g transform="translate(540,150)">
