    <rect x="-120" y="-8" width="240" height="16" rx="8" fill="#8A5A2B"/>
    <circle cx="-128" cy="0" r="12" fill="#4A2E20"/>
    <circle cx="128" cy="0" r="12" fill="#4A2E20"/>
